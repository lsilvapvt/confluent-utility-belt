apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-test-config
  namespace: default
data:
  # REPLACE: Your Confluent Cloud bootstrap server
  # Example: pkc-xxxxx.us-east-1.aws.confluent.cloud:9092
